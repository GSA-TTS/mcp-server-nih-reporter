applications:
  - name: nih-reporter-mcp-server
    buildpacks:
      - python_buildpack
    command: PYTHONPATH=src python -m reporter.app
    health-check-type: http
    health-check-http-endpoint: /health
    env:
      PYTHONUNBUFFERED: 1
    random-route: true
    disk_quota: 1G
    memory: 512M